<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADS - PANEL ESTABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6 font-sans">

    <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic text-blue-500 uppercase">Azelera <span class="text-white font-light">Ads</span></h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mt-2">Publicación Directa Atacames</p>
        </div>

        <div class="space-y-4">
            <!-- 1. Nombre -->
            <input id="tit" type="text" placeholder="Nombre del Comercio" 
                class="w-full p-4 bg-black/50 rounded-2xl border border-white/5 outline-none focus:border-blue-600 text-sm">

            <!-- 2. Link o Texto -->
            <textarea id="med" placeholder="Pega el LINK del video/foto o escribe un mensaje de texto..." 
                class="w-full p-4 bg-black/50 rounded-2xl border border-white/5 outline-none focus:border-blue-600 h-32 text-sm"></textarea>

            <!-- 3. Selección de Tipo -->
            <div class="grid grid-cols-2 gap-3 text-[10px] font-bold uppercase">
                <select id="tip" class="bg-black p-4 rounded-xl border border-white/5 outline-none">
                    <option value="image">📸 Imagen</option>
                    <option value="video">🎥 Video</option>
                    <option value="texto">📝 Solo Texto</option>
                </select>
                <div class="flex items-center justify-center bg-black rounded-xl border border-white/5 p-2">
                    <input id="col" type="color" value="#1e3a8a" class="w-full h-8 bg-transparent border-none cursor-pointer">
                </div>
            </div>

            <!-- 4. WhatsApp -->
            <input id="lin" type="text" placeholder="Link de WhatsApp (QR)" 
                class="w-full p-4 bg-black/50 rounded-2xl border border-white/5 outline-none text-sm">

            <!-- Botón Publicar -->
            <button id="btn-pub" onclick="publicar()" 
                class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-[2rem] font-black text-lg shadow-xl uppercase tracking-widest transition-all mt-4">
                Publicar Ahora
            </button>
        </div>

        <!-- Ayuda rápida para el usuario -->
        <div class="mt-6 p-4 bg-blue-600/5 rounded-2xl border border-blue-500/10 text-center">
            <p class="text-[9px] text-slate-400 uppercase font-bold mb-2 tracking-tighter">¿No tienes link? Usa estos sitios gratis:</p>
            <div class="flex gap-2 justify-center">
                <a href="https://es.imgbb.com/" target="_blank" class="text-[10px] text-blue-400 underline italic">Para Fotos</a>
                <span class="text-slate-600">|</span>
                <a href="https://www.file.io/" target="_blank" class="text-[10px] text-blue-400 underline italic">Para Videos</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" }));

        window.publicar = () => {
            const btn = document.getElementById('btn-pub');
            const media = document.getElementById('med').value.trim();
            const tit = document.getElementById('tit').value;

            if(!media || !tit) return alert("❌ Completa el Nombre y el Contenido.");

            btn.disabled = true;
            btn.innerText = "🚀 PUBLICANDO...";

            const ad = {
                titulo: tit,
                media: media,
                tipo: document.getElementById('tip').value,
                link: document.getElementById('lin').value || "https://wa.me/tu_numero",
                color: document.getElementById('col').value,
                fuente: "font-black italic",
                textura: "degradado",
                activo: true,
                vence: Date.now() + (30 * 86400000)
            };

            push(ref(db, 'carrusel'), ad).then(() => {
                alert("✅ ¡PUBLICADO! Revisa la TV.");
                location.reload();
            }).catch(() => {
                alert("Error de conexión.");
                btn.disabled = false;
                btn.innerText = "Publicar Ahora";
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZELERA PREMIUM CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; 
            overflow-x: hidden; 
            /* Fondo Espectacular: Gradiente Cósmico con Partículas */
            background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 40%, #020617 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Efecto Glassmorphism Premium */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Glow para elementos activos */
        .glow-blue {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        /* Estilo para el QR y Título encima */
        .qr-preview-container {
            background: white;
            padding: 12px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        #qr-title-preview {
            color: #0f172a;
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: 1px;
            max-width: 100px; /* Ancho del QR */
            word-wrap: break-word;
        }

        /* Animación suave de pulso */
        @keyframes pulse-subutil {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-subutil {
            animation: pulse-subutil 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Ocultar scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="fixed inset-0 opacity-20 pointer-events-none">
        <div class="absolute w-2 h-2 bg-blue-400 rounded-full top-10 left-10 animate-pulse"></div>
        <div class="absolute w-1 h-1 bg-purple-400 rounded-full top-40 right-20 animate-pulse" style="animation-delay: 1s"></div>
        <div class="absolute w-2 h-2 bg-blue-300 rounded-full bottom-32 left-1/4 animate-pulse" style="animation-delay: 2s"></div>
    </div>

    <div class="flex justify-between items-center mb-8 relative z-10">
        <div>
            <h1 class="text-2xl font-800 tracking-tighter text-blue-500">AZELERA<span class="text-white">ADS</span></h1>
            <p class="text-[9px] text-gray-400 uppercase tracking-widest font-bold">Premium Control System</p>
        </div>
        <div class="flex items-center gap-2 glass px-3 py-1.5 rounded-full border border-green-500/30">
            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] animate-pulse"></div>
            <span class="text-xs text-green-300 font-bold">TV ON</span>
        </div>
    </div>

    <div class="glass p-6 rounded-[2.5rem] space-y-5 mb-8 relative z-10 glow-blue">
        <div class="space-y-3">
            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Crear Nuevo Anuncio</h2>
            <input type="text" id="tit" placeholder="Título (Ej: Sabor Increíble)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-gray-600">
            <input type="text" id="lin" placeholder="Link o WhatsApp (para el QR)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-gray-600">
        </div>

        <label for="file-upload" id="file-label" class="group flex flex-col items-center justify-center border-2 border-dashed border-white/10 rounded-2xl p-6 transition-all active:scale-95 cursor-pointer hover:border-blue-500/50 hover:bg-blue-950/20">
            <span class="text-4xl mb-2 transition-transform group-hover:scale-110">🎬</span>
            <span id="file-info" class="text-[10px] font-bold text-gray-400 uppercase tracking-wider text-center">Toca para subir Video o Foto</span>
            <input type="file" id="file-upload" class="hidden" accept="image/*,video/*">
        </label>

        <div class="flex justify-center items-center gap-4 py-2">
            <div id="qr-preview-area" class="hidden text-center">
                <div class="qr-preview-container flex flex-col items-center">
                    <p id="qr-title-preview">TÍTULO</p> <div id="qrcode-canvas"></div>
                </div>
            </div>
            <p id="no-qr-msg" class="text-[10px] text-gray-600 italic">El QR se generará al poner un link</p>
        </div>

        <input type="hidden" id="med">
        <input type="hidden" id="tip" value="image">
        <input type="hidden" id="sub" value="">
        <input type="hidden" id="col" value="#3b82f6">

        <button onclick="guardar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-800 py-4 rounded-2xl shadow-lg shadow-blue-900/30 transition-all active:scale-95 uppercase text-xs tracking-widest flex items-center justify-center gap-2">
            <span>🚀</span> LANZAR A LA TV
        </button>
    </div>

    <div class="relative z-10">
        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-[10px] font-bold text-gray-400 tracking-[0.3em] uppercase">Anuncios en Pantalla</h2>
            <button onclick="cargarAnuncios()" class="text-xs text-blue-400 active:scale-90">🔄</button>
        </div>
        
        <div id="lista-anuncios" class="grid gap-4">
            <div class="text-center py-8 text-gray-600 text-sm animate-pulse">Cargando anuncios...</div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE (Reemplaza con tus datos reales)
        const supabaseUrl = 'https://TU_PROYECTO.supabase.co';
        const supabaseKey = 'TU_API_KEY_PUBLISHABLE';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        const BUCKET_NAME = 'anuncios'; // O 'ANUNCIOS' según lo creaste

        let qrcode;

        // INICIALIZAR QR
        window.addEventListener('load', () => {
            qrcode = new QRCode(document.getElementById("qrcode-canvas"), {
                text: "https://azelera.com",
                width: 100,
                height: 100,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            cargarAnuncios();
        });

        // ACTUALIZAR PREVIEW DE QR Y TÍTULO DINÁMICAMENTE
        const inputTit = document.getElementById('tit');
        const inputLin = document.getElementById('lin');
        const qrPreviewArea = document.getElementById('qr-preview-area');
        const qrTitlePreview = document.getElementById('qr-title-preview');
        const noQrMsg = document.getElementById('no-qr-msg');

        function actualizarQR() {
            const titulo = inputTit.value.trim() || "ESCRIBE TÍTULO";
            const link = inputLin.value.trim();

            qrTitlePreview.innerText = titulo;

            if (link) {
                qrcode.makeCode(link);
                qrPreviewArea.classList.remove('hidden');
                noQrMsg.classList.add('hidden');
            } else {
                qrPreviewArea.classList.add('hidden');
                noQrMsg.classList.remove('hidden');
            }
        }

        inputTit.addEventListener('input', actualizarQR);
        inputLin.addEventListener('input', actualizarQR);

        // SUBIR ARCHIVO A SUPABASE
        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const label = document.getElementById('file-label');
            const info = document.getElementById('file-info');
            info.innerText = "SUBIENDO... ⏳";
            info.classList.add('animate-pulse-subutil');

            const ext = file.name.split('.').pop();
            const fileName = `${Date.now()}.${ext}`;

            const { data, error } = await _supabase.storage
                .from(BUCKET_NAME)
                .upload(fileName, file);
            
            if (data) {
                const { data: urlData } = _supabase.storage.from(BUCKET_NAME).getPublicUrl(fileName);
                document.getElementById('med').value = urlData.publicUrl; 
                
                info.innerText = `✅ ${file.type.includes('video') ? 'VÍDEO' : 'FOTO'} LISTO`;
                info.classList.remove('animate-pulse-subutil');
                info.classList.add('text-blue-400');
                label.style.borderColor = "#3b82f6";
                
                document.getElementById('tip').value = file.type.includes('video') ? 'video' : 'image';
            } else {
                alert("Error crítico de Storage. Revisa las Políticas: " + error.message);
                info.innerText = "❌ ERROR AL SUBIR";
                info.classList.remove('animate-pulse-subutil');
                console.error(error);
            }
        });

        // GUARDAR EN BASE DE DATOS Y LANZAR A TV
        async function guardar() {
            const mediaUrl = document.getElementById('med').value;
            if(!mediaUrl) return alert("Primero debes subir un video o foto.");

            const payload = {
                titulo: document.getElementById('tit').value.trim() || "ANUNCIO PREMIUM",
                media: mediaUrl,
                link: document.getElementById('lin').value.trim() || "https://wa.me/593",
                tipo: document.getElementById('tip').value,
                activo: true,
                subtitulo: "", // No usado en este diseño simplificado
                color: "#3b82f6" // Color por defecto
            };

            const { error } = await _supabase.from('anuncios').insert([payload]);
            
            if (!error) {
                alert("🚀 ¡ANUNCIO LANZADO A LA TV EXITOSAMENTE!");
                location.reload();
            } else {
                alert("Error al guardar en BD: " + error.message);
                console.error(error);
            }
        }

        // CARGAR LISTA DE ANUNCIOS ACTIVOS
        async function cargarAnuncios() {
            const list = document.getElementById('lista-anuncios');
            const { data, error } = await _supabase
                .from('anuncios')
                .select('*')
                .order('id', { ascending: false });
            
            list.innerHTML = "";
            
            if (error) {
                list.innerHTML = `<div class="text-center text-red-400 text-xs py-4 glass rounded-xl">Error al cargar: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = `<div class="text-center text-gray-600 text-xs py-10 glass rounded-2xl">No hay anuncios activos en la TV</div>`;
                return;
            }

            data.forEach(ad => {
                const icon = ad.tipo === 'video' ? '📽️' : '🖼️';
                list.innerHTML += `
                    <div class="glass p-4 rounded-3xl flex items-center justify-between border-white/5 glow-blue/10">
                        <div class="flex items-center gap-4 truncate flex-1">
                            <div class="w-12 h-12 rounded-2xl bg-blue-950/50 flex items-center justify-center text-xl border border-blue-500/20">
                                ${icon}
                            </div>
                            <div class="truncate flex-1">
                                <p class="text-xs font-800 uppercase tracking-tight text-white">${ad.titulo}</p>
                                <p class="text-[9px] text-gray-500 truncate italic">${ad.media.split('/').pop()}</p>
                            </div>
                        </div>
                        <button onclick="borrar(${ad.id})" class="text-red-500 p-3 ml-2 active:scale-75 transition-all bg-red-950/30 rounded-full border border-red-500/20">
                            🗑️
                        </button>
                    </div>`;
            });
        }

        // BORRAR ANUNCIO
        async function borrar(id) { 
            if(confirm("¿Estás seguro de quitar este anuncio de la TV?")) { 
                const { error } = await _supabase.from('anuncios').delete().eq('id', id); 
                if(!error) cargarAnuncios(); 
                else alert("Error al borrar: " + error.message);
            } 
        }
    </script>
</body>
</html>

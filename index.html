<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>AZELERA ADMIN - COLORES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const config = { databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(config));

        window.subirAds = () => {
            const dias = parseInt(document.getElementById('dias').value) || 1;
            const data = {
                titulo: document.getElementById('titulo').value,
                media: document.getElementById('media').value,
                link: document.getElementById('link').value,
                tipo: document.getElementById('tipo').value,
                color: document.getElementById('color').value, // NUEVO: Color de fondo
                vence: Date.now() + (dias * 24 * 60 * 60 * 1000)
            };
            push(ref(db, 'carrusel'), data).then(() => {
                alert("✅ Anuncio programado con éxito");
                document.getElementById('media').value = "";
            });
        };
    </script>
</head>
<body class="bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto bg-slate-900 p-6 rounded-[2rem] border border-white/10">
        <h1 class="text-xl font-black text-blue-500 mb-6 text-center italic">AZELERA <span class="text-white">DESIGN</span></h1>
        
        <input id="titulo" type="text" placeholder="Cliente (Ej: Cevichería Don Lucho)" class="w-full p-4 mb-4 bg-black rounded-xl border border-slate-800 outline-none">
        <textarea id="media" placeholder="Link de Video/Imagen O el Texto del anuncio" class="w-full p-4 mb-4 bg-black rounded-xl border border-slate-800 outline-none h-24"></textarea>
        <input id="link" type="text" placeholder="Link para QR" class="w-full p-4 mb-4 bg-black rounded-xl border border-slate-800 outline-none">
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <select id="tipo" class="p-4 bg-black rounded-xl border border-slate-800">
                <option value="video">🎥 Video</option>
                <option value="image">🖼️ Imagen</option>
                <option value="texto">📝 Texto Solo</option>
            </select>
            <div class="flex items-center bg-black rounded-xl border border-slate-800 p-2">
                <span class="text-[10px] uppercase font-bold text-slate-500 mr-2">Color:</span>
                <input id="color" type="color" value="#1e3a8a" class="h-10 w-full bg-transparent border-none cursor-pointer">
            </div>
            <input id="dias" type="number" placeholder="Días" class="p-4 bg-black rounded-xl border border-slate-800 text-center">
        </div>

        <button onclick="subirAds()" class="w-full bg-blue-600 py-5 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">PUBLICAR ANUNCIO</button>
    </div>
</body>
</html>

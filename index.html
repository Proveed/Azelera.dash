<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>AZELERA STUDIO - DISEÑO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const db = getDatabase(initializeApp({ databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" }));

        window.publicar = () => {
            const data = {
                titulo: document.getElementById('tit').value,
                media: document.getElementById('med').value,
                link: document.getElementById('lin').value,
                tipo: document.getElementById('tip').value,
                color: document.getElementById('col').value,
                textura: document.getElementById('tex').value, // NUEVO
                fuente: document.getElementById('fnt').value,   // NUEVO
                activo: true,
                vence: Date.now() + (parseInt(document.getElementById('dias').value || 1) * 86400000)
            };
            push(ref(db, 'carrusel'), data).then(() => alert("Anuncio Programado"));
        };

        onValue(ref(db, 'carrusel'), (snap) => {
            const lista = document.getElementById('lista'); lista.innerHTML = "";
            const data = snap.val(); if(!data) return;
            Object.keys(data).forEach(id => {
                lista.innerHTML += `<div class="bg-black/50 p-3 rounded-xl mb-2 flex justify-between items-center border border-white/5">
                    <span class="text-xs font-bold">${data[id].titulo}</span>
                    <button onclick="borrar('${id}')" class="text-red-500 text-xs font-black">X</button>
                </div>`;
            });
        });
        window.borrar = (id) => remove(ref(db, `carrusel/${id}`));
    </script>
</head>
<body class="bg-[#020617] text-white p-4 font-sans">
    <div class="max-w-md mx-auto bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl border border-white/10">
        <h1 class="text-xl font-black text-blue-500 mb-4 italic text-center uppercase">Azelera <span class="text-white">Designer</span></h1>
        
        <input id="tit" type="text" placeholder="Cliente" class="w-full p-3 mb-2 bg-black rounded-xl border border-white/5 outline-none text-sm">
        <textarea id="med" placeholder="Texto o Link Directo .mp4 / .jpg" class="w-full p-3 mb-2 bg-black rounded-xl border border-white/5 outline-none h-20 text-sm"></textarea>
        <input id="lin" type="text" placeholder="Link QR (WhatsApp/Web)" class="w-full p-3 mb-4 bg-black rounded-xl border border-white/5 outline-none text-sm">

        <div class="grid grid-cols-2 gap-2 mb-4">
            <select id="tip" class="bg-black p-3 rounded-xl border border-white/5 text-xs">
                <option value="texto">📝 TEXTO SOLO</option>
                <option value="video">🎥 VIDEO MP4</option>
                <option value="image">🖼️ IMAGEN</option>
            </select>
            <div class="flex items-center bg-black rounded-xl border border-white/5 p-2">
                <input id="col" type="color" value="#1e3a8a" class="w-full h-8 bg-transparent">
            </div>
            
            <select id="tex" class="bg-black p-3 rounded-xl border border-white/5 text-xs text-blue-400">
                <option value="solido">Liso (Sólido)</option>
                <option value="degradado">Degradado Vivo</option>
                <option value="malla">Malla Galáctica</option>
                <option value="cristal">Cristal Ahumado</option>
            </select>

            <select id="fnt" class="bg-black p-3 rounded-xl border border-white/5 text-xs text-blue-400">
                <option value="font-black italic">Impacto (Italic)</option>
                <option value="font-serif">Elegante (Serif)</option>
                <option value="font-mono">Tecnológico (Mono)</option>
                <option value="font-light tracking-[0.2em]">Minimalista</option>
            </select>
            
            <input id="dias" type="number" placeholder="Días" class="bg-black p-3 rounded-xl border border-white/5 text-center text-xs">
        </div>

        <button onclick="publicar()" class="w-full bg-blue-600 py-4 rounded-2xl font-black shadow-lg uppercase tracking-widest text-sm">Programar Ahora</button>
        <div id="lista" class="mt-6 border-t border-white/5 pt-4"></div>
    </div>
</body>
</html>

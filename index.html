<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>AZELERA ADMIN - CARRUSEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const config = { 
            apiKey: "AIzaSyD3-C7guJHkmZuwv-TgXNh0XwlYfTSei2k", 
            databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" 
        };
        const db = getDatabase(initializeApp(config));

        window.agregarAnuncio = () => {
            const dias = parseInt(document.getElementById('dias').value);
            const vencimiento = Date.now() + (dias * 24 * 60 * 60 * 1000);
            
            const nuevoAnuncio = {
                texto: document.getElementById('txt').value,
                mediaUrl: document.getElementById('media').value,
                link: document.getElementById('link').value,
                tipo: document.getElementById('tipo').value,
                vence: vencimiento
            };
            
            push(ref(db, 'carrusel'), nuevoAnuncio).then(() => alert("Anuncio programado con éxito"));
        };
    </script>
</head>
<body class="bg-slate-950 text-white p-4">
    <div class="max-w-md mx-auto bg-slate-900 p-6 rounded-3xl border border-white/10">
        <h1 class="text-xl font-black text-blue-500 mb-4">PROGRAMAR CARRUSEL</h1>
        <input id="txt" type="text" placeholder="Título del anuncio" class="w-full p-3 mb-3 bg-black rounded-lg outline-none">
        <input id="media" type="text" placeholder="URL de Video o Imagen" class="w-full p-3 mb-3 bg-black rounded-lg outline-none">
        <input id="link" type="text" placeholder="Link para el QR" class="w-full p-3 mb-3 bg-black rounded-lg outline-none">
        <div class="flex gap-2 mb-4">
            <select id="tipo" class="flex-1 p-3 bg-black rounded-lg">
                <option value="video">Video</option>
                <option value="image">Imagen</option>
            </select>
            <input id="dias" type="number" placeholder="Días" class="w-20 p-3 bg-black rounded-lg text-center">
        </div>
        <button onclick="agregarAnuncio()" class="w-full bg-blue-600 py-4 rounded-xl font-bold">AÑADIR AL CARRUSEL</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADS - CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        input, textarea, select { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .btn-primary { background: #1d4ed8; box-shadow: 0 4px 14px rgba(29, 78, 216, 0.4); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto space-y-6">
        <div class="glass p-6 rounded-[2.5rem] shadow-xl">
            <h1 class="text-xl font-black italic text-center mb-6 uppercase tracking-widest text-blue-500">Lanzar Campaña</h1>
            
            <div class="space-y-3">
                <input id="tit" type="text" placeholder="Categoría (ej: JORNADA DE AYUDAS)" class="w-full p-4 rounded-2xl text-[10px] font-bold uppercase tracking-tighter">
                
                <div class="relative">
                    <input type="file" id="file-upload" class="hidden" accept="image/*,video/*">
                    <label for="file-upload" id="file-label" class="flex items-center justify-center w-full p-4 rounded-2xl border-2 border-dashed border-blue-500/30 bg-blue-500/5 cursor-pointer text-[10px] font-bold uppercase text-blue-400">
                        📁 Cargar Foto o Video
                    </label>
                </div>

                <input id="med" type="text" placeholder="TÍTULO GANCHO (ej: 7 NOCHES DE VIGILIAS)" class="w-full p-4 rounded-2xl text-sm font-black uppercase">
                <textarea id="sub" placeholder="Cuerpo del anuncio (ej: Estás invitado a un...)" class="w-full p-4 rounded-2xl h-24 text-sm italic"></textarea>
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="tip" class="p-4 rounded-2xl text-[10px] font-bold uppercase">
                        <option value="texto">📝 Texto + QR</option>
                        <option value="image">📸 Imagen Full</option>
                        <option value="video">🎥 Video Full</option>
                    </select>
                    <input id="col" type="color" value="#1d4ed8" class="w-full h-full rounded-2xl bg-transparent border-none cursor-pointer">
                </div>

                <input id="lin" type="text" placeholder="Link WhatsApp destino" class="w-full p-4 rounded-2xl text-xs">
                
                <button onclick="guardar()" id="btn-save" class="w-full btn-primary py-5 rounded-[1.5rem] font-black uppercase tracking-[0.2em] mt-2 active:scale-95 transition-all">Publicar en Vía</button>
            </div>
        </div>

        <div id="lista-anuncios" class="space-y-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const label = document.getElementById('file-label');
            label.innerText = "SUBIENDO ARCHIVO...";
            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data } = await _supabase.storage.from('anuncios').upload(fileName, file);
            if (data) {
                const { data: urlData } = _supabase.storage.from('anuncios').getPublicUrl(fileName);
                document.getElementById('med').value = urlData.publicUrl;
                label.innerText = "✅ ARCHIVO LISTO";
            } else { label.innerText = "❌ ERROR AL SUBIR"; }
        });

        async function cargarAnuncios() {
            const { data } = await _supabase.from('anuncios').select('*').order('id', { ascending: false });
            const list = document.getElementById('lista-anuncios');
            list.innerHTML = "";
            if (data) {
                data.forEach(ad => {
                    list.innerHTML += `
                        <div class="glass p-4 rounded-3xl flex items-center justify-between border border-white/5">
                            <div class="truncate flex-1 pr-4">
                                <p class="text-[9px] font-black text-blue-400 uppercase">${ad.titulo}</p>
                                <p class="text-[10px] opacity-70 italic truncate">${ad.media}</p>
                            </div>
                            <button onclick="borrar(${ad.id})" class="text-red-500 bg-red-500/10 p-2 rounded-xl">🗑️</button>
                        </div>
                    `;
                });
            }
        }

        async function guardar() {
            const payload = {
                titulo: document.getElementById('tit').value,
                media: document.getElementById('med').value,
                subtitulo: document.getElementById('sub').value,
                tipo: document.getElementById('tip').value,
                color: document.getElementById('col').value,
                link: document.getElementById('lin').value || "https://wa.me/593",
                activo: true
            };
            const { error } = await _supabase.from('anuncios').insert([payload]);
            if (!error) { location.reload(); }
        }

        async function borrar(id) { if(confirm("¿Eliminar?")) { await _supabase.from('anuncios').delete().eq('id', id); cargarAnuncios(); } }
        cargarAnuncios();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AZELERA PREMIUM CONTROL v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Oswald:wght@500;700&family=Playfair+Display:wght@700;900&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden;
            background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 40%, #020617 100%);
            background-attachment: fixed; min-height: 100vh;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .glow-active { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); border-color: rgba(59, 130, 246, 0.5); }
        
        .font-moderno { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-impacto { font-family: 'Oswald', sans-serif; }
        .font-elegante { font-family: 'Playfair Display', serif; }

        .qr-container { background: white; padding: 10px; border-radius: 16px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #qr-title-preview { color: #0f172a; font-weight: 800; font-size: 10px; text-transform: uppercase; text-align: center; margin-bottom: 2px; }
        #qr-sub-preview { color: #475569; font-size: 8px; text-align: center; margin-bottom: 4px; max-width: 100px; }

        select { -webkit-appearance: none; appearance: none; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="p-4 pb-28">

    <div class="flex justify-between items-center mb-8 relative z-10">
        <div>
            <h1 class="text-2xl font-800 tracking-tighter text-blue-500">AZELERA<span class="text-white">ADS</span></h1>
            <p class="text-[9px] text-gray-400 uppercase tracking-widest font-bold">Premium Control System v2</p>
        </div>
        <div class="flex items-center gap-2 glass px-3 py-1.5 rounded-full border border-green-500/30">
            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] animate-pulse"></div>
            <span class="text-xs text-green-300 font-bold uppercase">TV ON</span>
        </div>
    </div>

    <div id="panel-creacion" class="glass p-6 rounded-[2.5rem] space-y-5 mb-8 relative z-10 transition-all duration-500">
        <div class="flex justify-between items-center">
            <h2 id="panel-title" class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Crear Nuevo Anuncio</h2>
            <button id="btn-cancelar-edicion" onclick="cancelarEdicion()" class="hidden text-xs text-red-400 font-bold glass px-3 py-1 rounded-full">Cancelar</button>
        </div>

        <div class="space-y-3">
            <input type="text" id="tit" placeholder="Título (Ej: Sabor Increíble)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none placeholder:text-gray-600 text-white">
            <input type="text" id="sub" placeholder="Subtítulo (Ej: Promo solo hoy)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none placeholder:text-gray-600 text-white">
            <input type="text" id="lin" placeholder="Link o WhatsApp (para el QR)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none placeholder:text-gray-600 text-white">
        </div>

        <label for="file-upload" id="file-label" class="group flex flex-col items-center justify-center border-2 border-dashed border-white/10 rounded-2xl p-5 transition-all active:scale-95 cursor-pointer relative">
            <span class="text-3xl mb-1">🎬</span>
            <span id="file-info" class="text-[10px] font-bold text-gray-400 uppercase tracking-wider text-center">Video o Foto</span>
            <input type="file" id="file-upload" class="hidden" accept="image/*,video/*">
            <img id="file-preview-mic" class="hidden absolute inset-0 w-full h-full object-cover rounded-2xl opacity-20">
        </label>

        <div class="grid grid-cols-2 gap-3 text-xs">
            <div class="space-y-1.5">
                <label class="font-bold text-gray-500 uppercase tracking-wider text-[9px]">Color</label>
                <input type="color" id="col" value="#3b82f6" class="w-full h-10 bg-white/5 border border-white/10 rounded-xl cursor-pointer p-1">
            </div>
            <div class="space-y-1.5">
                <label class="font-bold text-gray-500 uppercase tracking-wider text-[9px]">Letra</label>
                <select id="fon" class="w-full h-10 bg-white/5 border border-white/10 rounded-xl px-3 outline-none font-bold text-white bg-slate-900">
                    <option value="font-moderno">Moderno</option>
                    <option value="font-impacto">Impacto</option>
                    <option value="font-elegante">Elegante</option>
                </select>
            </div>
            <div class="space-y-1.5 col-span-2">
                <label class="font-bold text-gray-500 uppercase tracking-wider text-[9px]">Fondo de Pantalla TV</label>
                <select id="bkg" class="w-full h-10 bg-white/5 border border-white/10 rounded-xl px-3 outline-none font-bold text-white bg-slate-900">
                    <option value="bg-cosmico">Cósmico Profundo (Oscuro)</option>
                    <option value="bg-aurora">Aurora Boreal (Verde/Azul)</option>
                    <option value="bg-minimal">Gris Minimalista</option>
                </select>
            </div>
        </div>

        <div class="flex justify-center items-center gap-4 py-1">
            <div id="qr-preview-area" class="hidden text-center">
                <div class="qr-container flex flex-col items-center">
                    <p id="qr-title-preview">TÍTULO</p>
                    <p id="qr-sub-preview">Subtítulo</p>
                    <div id="qrcode-canvas"></div>
                </div>
            </div>
            <p id="no-qr-msg" class="text-[10px] text-gray-600 italic">QR se activará con un link</p>
        </div>

        <input type="hidden" id="med">
        <input type="hidden" id="tip" value="image">
        <input type="hidden" id="edit-id" value=""> 
        <button id="btn-lanzar" onclick="guardarOActualizar()" class="w-full bg-blue-600 text-white font-800 py-4 rounded-2xl shadow-lg active:scale-95 uppercase text-xs tracking-widest flex items-center justify-center gap-2">
            <span id="btn-icon">🚀</span> <span id="btn-text">LANZAR A LA TV</span>
        </button>
    </div>

    <div class="relative z-10">
        <div class="flex justify-between items-center mb-4 px-2">
            <h2 class="text-[10px] font-bold text-gray-400 tracking-[0.3em] uppercase">Anuncios en Pantalla</h2>
            <button onclick="cargarAnuncios()" class="text-xs text-blue-400 active:scale-90">🔄</button>
        </div>
        <div id="lista-anuncios" class="grid gap-4">
            <!-- Cargando historial... -->
        </div>
    </div>

    <script>
        // CREDENCIALES RECUPERADAS DE TU CÓDIGO ORIGINAL
        const supabaseUrl = 'https://TU_PROYECTO.supabase.co'; // <--- Pon tu URL real aquí
        const supabaseKey = 'TU_API_KEY_PUBLISHABLE'; // <--- Pon tu API KEY real aquí
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        const BUCKET_NAME = 'anuncios';

        let qrcode;
        let modoEdicion = false;

        window.addEventListener('load', () => {
            qrcode = new QRCode(document.getElementById("qrcode-canvas"), {
                text: "https://azelera.com",
                width: 90, height: 90, colorDark : "#0f172a", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H
            });
            cargarAnuncios();
        });

        function actualizarQR() {
            const link = document.getElementById('lin').value.trim();
            document.getElementById('qr-title-preview').innerText = document.getElementById('tit').value.trim() || "TÍTULO";
            document.getElementById('qr-sub-preview').innerText = document.getElementById('sub').value.trim() || "Subtítulo";

            if (link) {
                qrcode.makeCode(link);
                document.getElementById('qr-preview-area').classList.remove('hidden');
                document.getElementById('no-qr-msg').classList.add('hidden');
            } else {
                document.getElementById('qr-preview-area').classList.add('hidden');
                document.getElementById('no-qr-msg').classList.remove('hidden');
            }
        }

        ['tit', 'sub', 'lin'].forEach(id => document.getElementById(id).addEventListener('input', actualizarQR));

        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const info = document.getElementById('file-info');
            info.innerText = "SUBIENDO...";
            
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await _supabase.storage.from(BUCKET_NAME).upload(fileName, file);
            
            if (data) {
                const { data: urlData } = _supabase.storage.from(BUCKET_NAME).getPublicUrl(fileName);
                document.getElementById('med').value = urlData.publicUrl; 
                info.innerText = "✅ ARCHIVO LISTO";
                document.getElementById('tip').value = file.type.includes('video') ? 'video' : 'image';
            }
        });

        async function guardarOActualizar() {
            const media = document.getElementById('med').value;
            if(!media) return alert("Sube un archivo primero");

            const payload = {
                titulo: document.getElementById('tit').value.trim(),
                subtitulo: document.getElementById('sub').value.trim(),
                link: document.getElementById('lin').value.trim(),
                media: media,
                tipo: document.getElementById('tip').value,
                color: document.getElementById('col').value,
                fuente: document.getElementById('fon').value,
                fondo: document.getElementById('bkg').value,
                activo: true
            };

            if (modoEdicion) {
                const id = document.getElementById('edit-id').value;
                const { error } = await _supabase.from('anuncios').update(payload).eq('id', id);
                if (!error) { alert("ACTUALIZADO"); cancelarEdicion(); cargarAnuncios(); }
                else alert("Error: " + error.message);
            } else {
                const { error } = await _supabase.from('anuncios').insert([payload]);
                if (!error) { alert("LANZADO"); location.reload(); }
                else alert("Error: " + error.message);
            }
        }

        async function cargarAnuncios() {
            const list = document.getElementById('lista-anuncios');
            const { data, error } = await _supabase.from('anuncios').select('*').order('id', { ascending: false });
            
            list.innerHTML = "";
            if (error) { list.innerHTML = `<p class="text-xs text-center text-red-500">${error.message}</p>`; return; }
            if (!data || data.length === 0) { list.innerHTML = `<p class="text-xs text-center text-gray-500">No hay anuncios</p>`; return; }

            data.forEach(ad => {
                const card = document.createElement('div');
                card.className = "glass p-4 rounded-3xl flex items-center justify-between border-white/5 active:scale-95 transition-all";
                card.style = `border-left: 4px solid ${ad.color}`;
                card.innerHTML = `
                    <div class="flex items-center gap-4 truncate flex-1">
                        <div class="w-12 h-12 rounded-2xl bg-black/30 flex items-center justify-center text-xl border border-white/10 shrink-0">
                            ${ad.tipo === 'video' ? '📽️' : '🖼️'}
                        </div>
                        <div class="truncate">
                            <p class="text-xs font-800 uppercase text-white truncate">${ad.titulo}</p>
                            <p class="text-[9px] text-gray-400 italic truncate">${ad.subtitulo || 'Sin subtítulo'}</p>
                        </div>
                    </div>
                    <button class="btn-del text-red-500 p-3 ml-2 active:scale-75 bg-red-950/30 rounded-full border border-red-500/20">🗑️</button>
                `;
                
                // Hacer el área de la tarjeta editable al clic (Seguro para móviles)
                card.querySelector('.flex.items-center.gap-4').onclick = () => cargarParaEditar(ad);
                
                // Borrar anuncio
                card.querySelector('.btn-del').onclick = (e) => {
                    e.stopPropagation();
                    borrar(ad.id);
                };

                list.appendChild(card);
            });
        }

        function cargarParaEditar(ad) {
            modoEdicion = true;
            document.getElementById('panel-creacion').classList.add('glow-active');
            document.getElementById('panel-title').innerText = "Editando Anuncio";
            document.getElementById('btn-cancelar-edicion').classList.remove('hidden');
            
            document.getElementById('edit-id').value = ad.id;
            document.getElementById('tit').value = ad.titulo;
            document.getElementById('sub').value = ad.subtitulo || "";
            document.getElementById('lin').value = ad.link || "";
            document.getElementById('med').value = ad.media;
            document.getElementById('tip').value = ad.tipo;
            document.getElementById('col').value = ad.color;
            document.getElementById('fon').value = ad.fuente;
            document.getElementById('bkg').value = ad.fondo;
            
            document.getElementById('btn-icon').innerText = "💾";
            document.getElementById('btn-text').innerText = "GUARDAR CAMBIOS";

            actualizarQR();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicion() {
            modoEdicion = false;
            document.getElementById('panel-creacion').classList.remove('glow-active');
            document.getElementById('panel-title').innerText = "Crear Nuevo Anuncio";
            document.getElementById('btn-cancelar-edicion').classList.add('hidden');
            document.getElementById('edit-id').value = "";
            document.getElementById('tit').value = ""; 
            document.getElementById('sub').value = ""; 
            document.getElementById('lin').value = "";
            document.getElementById('med').value = "";
            document.getElementById('file-info').innerText = "Video o Foto";
            document.getElementById('btn-icon').innerText = "🚀";
            document.getElementById('btn-text').innerText = "LANZAR A LA TV";
            actualizarQR();
        }

        async function borrar(id) { 
            if(confirm("¿Eliminar anuncio de la TV?")) { 
                await _supabase.from('anuncios').delete().eq('id', id); 
                cargarAnuncios();
            } 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADS - PANEL MAESTRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-grad { background: linear-gradient(90deg, #2563eb, #1d4ed8); transition: 0.3s; }
        .btn-grad:hover { transform: scale(1.02); box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.5); }
        input[type="file"]::file-selector-button { display: none; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass p-10 rounded-[3rem] shadow-2xl">
        <!-- Logo -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500 uppercase">
                Azelera <span class="text-white font-light">Ads</span>
            </h1>
            <div class="h-1 w-16 bg-blue-600 mx-auto mt-2 rounded-full"></div>
        </div>

        <div class="space-y-6">
            <!-- 1. Nombre -->
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest mb-2 block">Nombre del Comercio</label>
                <input id="tit" type="text" placeholder="Ej: Restaurante El Faro" 
                    class="w-full p-5 bg-black/60 rounded-2xl border border-white/5 outline-none focus:border-blue-600 transition-all text-sm font-medium">
            </div>

            <!-- 2. Galería -->
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest mb-2 block">Subir de Galería</label>
                <label for="archivo" class="flex flex-col items-center justify-center w-full h-40 bg-black/50 border-2 border-dashed border-blue-500/20 rounded-[2.5rem] cursor-pointer hover:border-blue-500/50 transition-all group">
                    <div id="display-upload" class="flex flex-col items-center justify-center px-4 text-center">
                        <svg class="w-10 h-10 mb-3 text-blue-500 opacity-60 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p id="file-name" class="text-xs text-blue-400 font-bold uppercase tracking-widest leading-relaxed">Toca para elegir<br>Foto o Video</p>
                    </div>
                    <input id="archivo" type="file" accept="image/*,video/*" class="hidden" onchange="previewFile()">
                </label>
            </div>

            <!-- 3. WhatsApp -->
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest mb-2 block">WhatsApp para el QR</label>
                <input id="lin" type="text" placeholder="Ej: https://wa.me/593..." 
                    class="w-full p-5 bg-black/60 rounded-2xl border border-white/5 outline-none focus:border-blue-600 transition-all text-sm">
            </div>

            <!-- Botón Publicar -->
            <div class="pt-4">
                <button id="btn-pub" onclick="publicar()" 
                    class="w-full btn-grad py-6 rounded-[2.2rem] font-black text-xl shadow-xl uppercase tracking-[0.2em] active:scale-95">
                    Publicar Anuncio
                </button>
                <p id="status" class="text-center text-[10px] font-black text-blue-500 uppercase mt-4 hidden animate-pulse"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURACIÓN ÚNICA
        const fbApp = initializeApp({ databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" });
        const db = getDatabase(fbApp);

        // Vista previa al seleccionar
        window.previewFile = () => {
            const file = document.getElementById('archivo').files[0];
            const label = document.getElementById('file-name');
            if(file) {
                const size = (file.size / (1024*1024)).toFixed(1);
                label.innerHTML = `<span class="text-green-400 italic">LISTO: ${file.name.substring(0,10)}...<br>(${size}MB)</span>`;
            }
        };

        window.publicar = async () => {
            const btn = document.getElementById('btn-pub');
            const status = document.getElementById('status');
            const file = document.getElementById('archivo').files[0];
            const tit = document.getElementById('tit').value;

            if(!file || !tit) return alert("❌ Completa el Nombre y elige el Archivo.");

            // Bloquear interfaz
            btn.disabled = true;
            btn.style.opacity = "0.5";
            status.innerText = "🚀 SUBIENDO A LA NUBE... ESPERE";
            status.classList.remove("hidden");

            // Subida a Cloudinary
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "ml_default"); 

            try {
                // Usamos el endpoint AUTO para que detecte si es video o imagen
                const res = await fetch("https://api.cloudinary.com/v1_1/demo/auto/upload", {
                    method: "POST",
                    body: formData
                });
                
                const cloudData = await res.json();
                
                if(!cloudData.secure_url) throw new Error("Fallo en servidor");

                // Guardar en Firebase para la TV
                const ad = {
                    titulo: tit,
                    media: cloudData.secure_url,
                    tipo: file.type.includes('video') ? 'video' : 'image',
                    link: document.getElementById('lin').value || "https://wa.me/tu_numero",
                    color: "#1e3a8a",
                    fuente: "font-black italic",
                    textura: "degradado",
                    activo: true,
                    vence: Date.now() + (30 * 86400000)
                };

                await push(ref(db, 'carrusel'), ad);
                alert("🚀 ¡ANUNCIO PUBLICADO CON ÉXITO!");
                location.reload();

            } catch (e) {
                alert("⚠️ ERROR: El archivo es demasiado pesado para el modo gratuito.\n\nSOLUCIÓN: Intenta con un video de máximo 15 segundos o una foto normal.");
                btn.disabled = false;
                btn.style.opacity = "1";
                status.classList.add("hidden");
            }
        };
    </script>
</body>
</html>

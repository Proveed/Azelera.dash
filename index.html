<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADS - CONTROL TOTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); }
        input, textarea, select { background: rgba(0,0,0,0.6) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .btn-lanzar { background: linear-gradient(90deg, #1d4ed8, #3b82f6); box-shadow: 0 10px 25px rgba(29, 78, 216, 0.4); }
        .section-label { font-size: 10px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-left: 10px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <div id="form-card" class="glass p-8 rounded-[3rem] shadow-2xl relative overflow-hidden">
            <h1 class="text-2xl font-black italic text-blue-500 mb-8 uppercase text-center tracking-tighter">Editor de Impacto TV</h1>
            <input type="hidden" id="edit-id">
            
            <div class="space-y-5">
                <!-- 1. CATEGORÍA (PEQUEÑO ARRIBA) -->
                <div>
                    <span class="section-label">1. Categoría (Texto pequeño arriba)</span>
                    <input id="tit" type="text" placeholder="EJ: JORNADA DE AYUDAS" class="w-full p-4 rounded-2xl text-xs font-bold uppercase tracking-widest">
                </div>

                <!-- 2. EL TÍTULO GANCHO (LO QUE TÚ EDITAS COMO QUIERAS) -->
                <div>
                    <span class="section-label">2. Título Gancho (Lo más grande en la TV)</span>
                    <input id="med" type="text" placeholder="ESCRIBE AQUÍ EL TÍTULO GIGANTE" class="w-full p-5 rounded-2xl text-lg font-black uppercase italic border-blue-500/30">
                </div>

                <!-- 3. CUERPO DEL MENSAJE -->
                <div>
                    <span class="section-label">3. Subtítulo o Detalles</span>
                    <textarea id="sub" placeholder="Escribe los detalles aquí..." class="w-full p-4 rounded-2xl h-24 text-sm italic"></textarea>
                </div>

                <!-- 4. CARGA DE IMAGEN/VIDEO (OPCIONAL) -->
                <div>
                    <span class="section-label">4. Archivo Visual (Opcional)</span>
                    <input type="file" id="file-upload" class="hidden" accept="image/*,video/*">
                    <label for="file-upload" id="file-label" class="flex items-center justify-between w-full p-4 rounded-2xl border-2 border-dashed border-blue-500/20 bg-blue-500/5 cursor-pointer">
                        <span class="text-blue-400 text-[10px] font-black uppercase italic">📁 Cargar Foto o Video</span>
                        <span id="file-status" class="text-[9px] text-slate-500">Sin archivo</span>
                    </label>
                    <input type="hidden" id="file-url"> <!-- Aquí se guarda la URL secreta -->
                </div>
                
                <!-- 5. ESTILO Y COLOR -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <span class="section-label">Color de Fondo</span>
                        <input id="col" type="color" value="#1d4ed8" class="w-full h-[54px] rounded-2xl cursor-pointer bg-transparent border-none">
                    </div>
                    <div>
                        <span class="section-label">Tipo de Anuncio</span>
                        <select id="tip" class="w-full p-4 rounded-2xl text-xs font-bold">
                            <option value="texto">📝 Texto + QR</option>
                            <option value="image">📸 Imagen Full</option>
                            <option value="video">🎥 Video Full</option>
                        </select>
                    </div>
                </div>

                <!-- 6. LINK QR -->
                <div>
                    <span class="section-label">Link para el Código QR</span>
                    <input id="lin" type="text" placeholder="https://wa.me/593..." class="w-full p-4 rounded-2xl text-xs">
                </div>

                <div class="flex gap-2 pt-6">
                    <button onclick="guardar()" id="btn-save" class="flex-1 btn-lanzar py-5 rounded-[2rem] font-black uppercase tracking-[0.2em] hover:brightness-110 active:scale-95 transition-all">Publicar Campaña</button>
                    <button id="btn-cancel" onclick="resetForm()" class="hidden bg-slate-800 px-6 rounded-[2rem] text-white font-bold italic">X</button>
                </div>
            </div>
        </div>

        <!-- LISTA DE CONTROL -->
        <div class="glass p-6 rounded-[2.5rem]">
            <h2 class="text-xs font-black mb-4 uppercase text-slate-500 tracking-widest text-center italic">Campañas en Tiempo Real</h2>
            <div id="lista-anuncios" class="space-y-3"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // LÓGICA DE CARGA MEJORADA: No borra tu título
        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('file-status');
            status.innerText = "SUBIENDO...";
            
            const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data, error } = await _supabase.storage.from('anuncios').upload(fileName, file);
            
            if (data) {
                const { data: urlData } = _supabase.storage.from('anuncios').getPublicUrl(fileName);
                // GUARDAMOS LA URL EN EL CAMPO OCULTO, NO EN EL TÍTULO
                document.getElementById('file-url').value = urlData.publicUrl;
                status.innerText = "✅ LISTO";
                status.classList.add('text-green-400');
            } else {
                alert("Error al subir. Revisa Storage.");
                status.innerText = "❌ ERROR";
            }
        });

        async function cargarAnuncios() {
            const { data } = await _supabase.from('anuncios').select('*').order('id', { ascending: false });
            const list = document.getElementById('lista-anuncios');
            list.innerHTML = "";
            if (data) {
                data.forEach(ad => {
                    list.innerHTML += `
                        <div class="bg-black/40 p-4 rounded-[1.5rem] border border-white/5 flex items-center justify-between">
                            <div class="truncate flex-1 pr-4">
                                <p class="text-blue-400 font-black text-[9px] uppercase">${ad.titulo}</p>
                                <p class="text-xs text-white font-bold italic truncate">${ad.media}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick='prepararEdicion(${JSON.stringify(ad)})' class="bg-blue-600/20 text-blue-400 px-3 py-2 rounded-xl text-[9px] font-black">EDITAR</button>
                                <button onclick="borrar(${ad.id})" class="text-red-500 p-2">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        async function guardar() {
            const id = document.getElementById('edit-id').value;
            const fileUrl = document.getElementById('file-url').value;
            const tipoAnuncio = document.getElementById('tip').value;

            // Si es imagen o video, usamos la URL del archivo. Si es texto, usamos lo que escribiste en el título.
            let contenidoMedia = document.getElementById('med').value;
            if ((tipoAnuncio === 'image' || tipoAnuncio === 'video') && fileUrl !== "") {
                contenidoMedia = fileUrl;
            }

            const payload = {
                titulo: document.getElementById('tit').value,
                media: contenidoMedia,
                subtitulo: document.getElementById('sub').value,
                tipo: tipoAnuncio,
                color: document.getElementById('col').value,
                link: document.getElementById('lin').value || "https://wa.me/593",
                activo: true
            };

            if (id) await _supabase.from('anuncios').update(payload).eq('id', id);
            else await _supabase.from('anuncios').insert([payload]);

            resetForm(); cargarAnuncios();
        }

        function prepararEdicion(ad) {
            document.getElementById('edit-id').value = ad.id;
            document.getElementById('tit').value = ad.titulo;
            document.getElementById('med').value = ad.media;
            document.getElementById('sub').value = ad.subtitulo;
            document.getElementById('tip').value = ad.tipo;
            document.getElementById('col').value = ad.color;
            document.getElementById('lin').value = ad.link;
            document.getElementById('btn-save').innerText = "GUARDAR CAMBIOS";
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
            document.getElementById('file-url').value = "";
            document.getElementById('file-status').innerText = "Sin archivo";
            document.getElementById('btn-save').innerText = "PUBLICAR CAMPAÑA";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        async function borrar(id) { if(confirm("¿Eliminar?")) { await _supabase.from('anuncios').delete().eq('id', id); cargarAnuncios(); } }
        cargarAnuncios();
    </script>
</body>
</html>

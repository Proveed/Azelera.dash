<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADMIN - MOVIL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        input, select { background: #1a1a1a !important; color: white !important; border: 1px solid #333 !important; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-md mx-auto">
        <header class="mb-6">
            <h1 class="text-2xl font-black text-blue-500">AZELERA<span class="text-white">ADS</span></h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest">Panel del Anunciante</p>
        </header>

        <div class="card p-6 space-y-4">
            <!-- TEXTOS -->
            <div class="space-y-2">
                <input type="text" id="tit" placeholder="Título (Ej: Pizza 2x1)" class="w-full p-4 rounded-xl outline-none">
                <input type="text" id="sub" placeholder="Subtítulo corto" class="w-full p-4 rounded-xl outline-none">
                <input type="text" id="lin" placeholder="Link QR (WhatsApp)" class="w-full p-4 rounded-xl outline-none">
            </div>

            <!-- ESTILOS -->
            <div class="grid grid-cols-2 gap-2">
                <select id="fnt" class="p-3 rounded-xl text-sm">
                    <option value="moderno">Fuente Moderna</option>
                    <option value="impacto">Fuente Impacto</option>
                    <option value="elegante">Fuente Elegante</option>
                </select>
                <div class="flex items-center bg-[#1a1a1a] p-2 rounded-xl border border-[#333]">
                    <span class="text-[10px] mr-2">Color:</span>
                    <input type="color" id="clr" value="#FFFFFF" class="flex-1 h-8 bg-transparent">
                </div>
            </div>
            
            <input type="text" id="bg_hex" placeholder="Color Fondo Hex (Ej: #ff0000)" class="w-full p-4 rounded-xl outline-none text-sm">

            <!-- SUBIDA -->
            <label class="flex flex-col items-center justify-center border-2 border-dashed border-gray-700 rounded-2xl p-6 active:bg-white/5">
                <span id="ad-status" class="text-xs font-bold uppercase text-gray-400">Toca para subir Media</span>
                <input type="file" id="file-ad" class="hidden" accept="image/*,video/*">
            </label>

            <input type="hidden" id="med_url">
            <input type="hidden" id="tipo">

            <button onclick="enviar()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95">
                🚀 LANZAR A TV
            </button>
        </div>

        <div id="lista" class="mt-8 space-y-3"></div>
    </div>

    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Subida de archivo
        document.getElementById('file-ad').onchange = async (e) => {
            const file = e.target.files[0];
            const status = document.getElementById('ad-status');
            status.innerText = "SUBIENDO...";
            
            const name = `${Date.now()}.${file.name.split('.').pop()}`;
            const { data } = await _supabase.storage.from('anuncios').upload(`media/${name}`, file);
            
            if (data) {
                const { data: url } = _supabase.storage.from('anuncios').getPublicUrl(`media/${name}`);
                document.getElementById('med_url').value = url.publicUrl;
                document.getElementById('tipo').value = file.type.includes('video') ? 'video' : 'image';
                status.innerText = "✅ CARGADO";
            }
        };

        async function enviar() {
            const btn = document.getElementById('btn');
            btn.innerText = "ENVIANDO...";
            
            const payload = {
                titulo: document.getElementById('tit').value,
                subtitulo: document.getElementById('sub').value,
                link: document.getElementById('lin').value,
                font_family: document.getElementById('fnt').value,
                bg_color: document.getElementById('bg_hex').value || '#1e3a8a',
                color: document.getElementById('clr').value,
                media: document.getElementById('med_url').value,
                tipo: document.getElementById('tipo').value,
                activo: true
            };

            await _supabase.from('anuncios').insert([payload]);
            location.reload();
        }

        async function cargar() {
            const { data } = await _supabase.from('anuncios').select('*').order('id', {ascending:false});
            document.getElementById('lista').innerHTML = data.map(ad => `
                <div class="card p-4 flex items-center justify-between">
                    <span class="text-xs truncate w-40">${ad.titulo}</span>
                    <button onclick="borrar(${ad.id})" class="text-red-500 text-xs font-bold">ELIMINAR</button>
                </div>
            `).join('');
        }

        async function borrar(id) {
            if(confirm("¿Borrar?")) {
                await _supabase.from('anuncios').delete().eq('id', id);
                cargar();
            }
        }
        cargar();
    </script>
</body>
</html>

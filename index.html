<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA PRO - PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .btn-publish { background: linear-gradient(90deg, #1d4ed8, #3b82f6); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto space-y-6">
        <div class="glass p-8 rounded-[3rem] shadow-2xl">
            <h1 class="text-xl font-black italic text-blue-500 mb-6 uppercase text-center">Editor de Campañas</h1>
            
            <div class="space-y-4">
                <input id="tit" type="text" placeholder="CATEGORÍA (EJ: IGLESIA)" class="w-full p-4 rounded-2xl bg-black/50 border border-white/10 uppercase text-xs font-bold">
                
                <!-- CARGA DE ARCHIVO CON DETECCIÓN DE ERRORES -->
                <div class="relative">
                    <input type="file" id="file-upload" class="hidden" accept="image/*,video/*">
                    <label for="file-upload" id="file-label" class="flex flex-col items-center justify-center w-full p-6 rounded-2xl border-2 border-dashed border-blue-500/30 bg-blue-500/5 cursor-pointer">
                        <span class="text-blue-400 text-xs font-bold uppercase">📷 Toca para subir Foto/Video</span>
                        <span id="status-msg" class="text-[9px] text-slate-500 mt-2 italic text-center">Máximo 50MB</span>
                    </label>
                </div>

                <input id="med" type="text" placeholder="TÍTULO GANCHO (EJ: NOCHE DE GLORIA)" class="w-full p-4 rounded-2xl bg-black/50 border border-white/10 font-black uppercase">
                <textarea id="sub" placeholder="Cuerpo del anuncio..." class="w-full p-4 rounded-2xl bg-black/50 border border-white/10 h-24 text-sm italic"></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="tip" class="p-4 rounded-2xl bg-black/50 border border-white/10 text-xs font-bold">
                        <option value="texto">📝 Texto + QR</option>
                        <option value="image">📸 Imagen Full</option>
                        <option value="video">🎥 Video Full</option>
                    </select>
                    <input id="col" type="color" value="#1d4ed8" class="w-full h-[54px] rounded-2xl cursor-pointer bg-transparent border-none">
                </div>

                <input id="lin" type="text" placeholder="Link WhatsApp destino" class="w-full p-4 rounded-2xl bg-black/50 border border-white/10 text-xs">
                
                <button onclick="guardar()" class="w-full btn-publish py-5 rounded-[2rem] font-black uppercase tracking-widest active:scale-95 transition-all">Lanzar a la TV</button>
            </div>
        </div>
        <div id="lista-anuncios" class="space-y-3"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk'; // Tu llave pública
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const label = document.getElementById('file-label');
            const msg = document.getElementById('status-msg');
            
            label.classList.add('animate-pulse');
            msg.innerText = "SUBIENDO... NO CIERRES";

            // Limpiamos el nombre del archivo para evitar errores de red
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;

            try {
                const { data, error } = await _supabase.storage
                    .from('anuncios')
                    .upload(fileName, file);

                if (error) throw error;

                const { data: urlData } = _supabase.storage.from('anuncios').getPublicUrl(fileName);
                document.getElementById('med').value = urlData.publicUrl;
                
                label.classList.remove('animate-pulse');
                label.style.borderColor = "#22c55e";
                msg.innerText = "✅ ARCHIVO LISTO EN LA NUBE";
                msg.classList.add('text-green-400');
            } catch (err) {
                console.error(err);
                label.classList.remove('animate-pulse');
                label.style.borderColor = "#ef4444";
                msg.innerText = "❌ ERROR: Revisa permisos de Storage en Supabase";
                msg.classList.add('text-red-400');
                alert("Error técnico: " + err.message);
            }
        });

        async function cargarAnuncios() {
            const { data } = await _supabase.from('anuncios').select('*').order('id', { ascending: false });
            const list = document.getElementById('lista-anuncios');
            list.innerHTML = "";
            if (data) {
                data.forEach(ad => {
                    list.innerHTML += `
                        <div class="glass p-4 rounded-3xl flex items-center justify-between">
                            <div class="truncate flex-1 pr-4">
                                <p class="text-[9px] font-black text-blue-400 uppercase">${ad.titulo}</p>
                                <p class="text-[10px] opacity-70 italic truncate">${ad.media}</p>
                            </div>
                            <button onclick="borrar(${ad.id})" class="text-red-500 bg-red-500/10 p-2 rounded-xl">🗑️</button>
                        </div>`;
                });
            }
        }

        async function guardar() {
            const payload = {
                titulo: document.getElementById('tit').value,
                media: document.getElementById('med').value,
                subtitulo: document.getElementById('sub').value,
                tipo: document.getElementById('tip').value,
                color: document.getElementById('col').value,
                link: document.getElementById('lin').value || "https://wa.me/593",
                activo: true
            };
            const { error } = await _supabase.from('anuncios').insert([payload]);
            if (!error) { location.reload(); } else { alert("Error al guardar texto: " + error.message); }
        }

        async function borrar(id) { if(confirm("¿Eliminar?")) { await _supabase.from('anuncios').delete().eq('id', id); cargarAnuncios(); } }
        cargarAnuncios();
    </script>
</body>
</html>

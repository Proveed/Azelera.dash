<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADS - CONTROL POSTGRES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        input, textarea, select { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div id="form-card" class="glass p-8 rounded-[2.5rem] shadow-2xl self-start sticky top-10">
            <h1 id="form-title" class="text-2xl font-black italic text-blue-500 mb-6 uppercase text-center">Nuevo Anuncio</h1>
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input id="tit" type="text" placeholder="Nombre del Negocio" class="w-full p-4 rounded-2xl text-sm">
                <input id="med" type="text" placeholder="TÍTULO PRINCIPAL" class="w-full p-4 rounded-2xl text-sm font-black">
                <textarea id="sub" placeholder="Cuerpo del mensaje (Subtítulo)" class="w-full p-4 rounded-2xl h-20 text-sm italic"></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <select id="tip" class="p-4 rounded-2xl text-xs font-bold uppercase">
                        <option value="texto">📝 Texto + QR</option>
                        <option value="image">📸 Imagen Full</option>
                        <option value="video">🎥 Video Full</option>
                    </select>
                    <div class="flex items-center gap-3 p-2 glass rounded-2xl">
                        <input id="col" type="color" value="#1e3a8a" class="flex-1 h-10 cursor-pointer bg-transparent border-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="tex" class="p-4 rounded-2xl text-[10px] font-bold uppercase">
                        <option value="degradado">✨ Efecto Vivo</option>
                        <option value="solido">🎨 Color Liso</option>
                    </select>
                    <select id="fnt" class="p-4 rounded-2xl text-[10px] font-bold uppercase">
                        <option value="font-black italic">Letra Impacto</option>
                        <option value="font-serif italic">Letra Elegante</option>
                    </select>
                </div>
                <input id="lin" type="text" placeholder="Link WhatsApp" class="w-full p-4 rounded-2xl text-sm">
                <div class="flex gap-2 pt-4">
                    <button onclick="guardar()" id="btn-save" class="flex-1 bg-blue-600 py-5 rounded-[2rem] font-black uppercase tracking-widest">Lanzar Anuncio</button>
                    <button id="btn-cancel" onclick="resetForm()" class="hidden bg-slate-800 px-6 rounded-[2rem] text-white font-bold">X</button>
                </div>
            </div>
        </div>

        <div class="glass p-8 rounded-[2.5rem]">
            <h2 class="text-xl font-black mb-6 uppercase text-slate-400">Carrusel Activo</h2>
            <div id="lista-anuncios" class="space-y-4">
                <p class="text-xs text-slate-500 italic">Conectando a Postgres...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuración de Supabase (Sustituye con tus llaves del dashboard de Supabase si es necesario)
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'TU_SUPABASE_ANON_KEY'; // Debes poner tu clave anon de Supabase aquí
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarAnuncios() {
            const { data, error } = await _supabase.from('anuncios').select('*').order('id', { ascending: false });
            const list = document.getElementById('lista-anuncios');
            list.innerHTML = "";
            if (data) {
                data.forEach(ad => {
                    list.innerHTML += `
                        <div class="bg-black/40 p-5 rounded-3xl flex items-center justify-between border border-white/5">
                            <div class="truncate w-40">
                                <p class="font-black text-blue-400 text-[10px] uppercase">${ad.titulo}</p>
                                <p class="text-xs text-slate-300">${ad.media}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick='prepararEdicion(${JSON.stringify(ad)})' class="text-blue-400 font-bold text-[10px]">EDITAR</button>
                                <button onclick="borrar(${ad.id})" class="text-red-500">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        async function guardar() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                titulo: document.getElementById('tit').value,
                media: document.getElementById('med').value,
                subtitulo: document.getElementById('sub').value,
                tipo: document.getElementById('tip').value,
                color: document.getElementById('col').value,
                textura: document.getElementById('tex').value,
                fuente: document.getElementById('fnt').value,
                link: document.getElementById('lin').value,
                activo: true
            };

            if (id) {
                await _supabase.from('anuncios').update(payload).eq('id', id);
            } else {
                await _supabase.from('anuncios').insert([payload]);
            }
            resetForm();
            cargarAnuncios();
        }

        async function borrar(id) {
            if (confirm("¿Eliminar?")) {
                await _supabase.from('anuncios').delete().eq('id', id);
                cargarAnuncios();
            }
        }

        function prepararEdicion(ad) {
            document.getElementById('edit-id').value = ad.id;
            document.getElementById('tit').value = ad.titulo;
            document.getElementById('med').value = ad.media;
            document.getElementById('sub').value = ad.subtitulo;
            document.getElementById('tip').value = ad.tipo;
            document.getElementById('col').value = ad.color;
            document.getElementById('tex').value = ad.textura;
            document.getElementById('fnt').value = ad.fuente;
            document.getElementById('lin').value = ad.link;
            document.getElementById('btn-save').innerText = "Guardar Cambios";
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
            document.getElementById('btn-save').innerText = "Lanzar Anuncio";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        cargarAnuncios();
    </script>
</body>
</html>

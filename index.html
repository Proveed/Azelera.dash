<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADS - SISTEMA DE GESTIÓN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen p-4 font-sans">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <!-- FORMULARIO DE EDICIÓN / PUBLICACIÓN -->
        <div id="form-container" class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl border border-white/10 transition-all duration-500">
            <h1 id="form-title" class="text-2xl font-black italic text-blue-500 mb-6 text-center uppercase tracking-tighter">Nuevo <span class="text-white font-light">Anuncio</span></h1>
            
            <input type="hidden" id="edit-id"> <!-- Campo oculto para saber qué editamos -->

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="tit" type="text" placeholder="Nombre del Negocio" class="w-full p-4 bg-black rounded-2xl border border-white/5 outline-none focus:border-blue-600 text-sm">
                <input id="lin" type="text" placeholder="Link WhatsApp (QR)" class="w-full p-4 bg-black rounded-2xl border border-white/5 outline-none focus:border-blue-600 text-sm">
                
                <textarea id="med" placeholder="Link de Foto/Video o Mensaje de Texto" class="w-full p-4 bg-black rounded-2xl border border-white/5 outline-none focus:border-blue-600 h-24 text-sm md:col-span-2"></textarea>

                <select id="tip" class="bg-black p-4 rounded-xl border border-white/5 text-xs font-bold">
                    <option value="image">📸 Imagen</option><option value="video">🎥 Video</option><option value="texto">📝 Texto</option>
                </select>
                
                <div class="flex items-center gap-2 bg-black p-2 rounded-xl border border-white/5">
                    <span class="text-[10px] uppercase font-bold text-slate-500 ml-2">Color:</span>
                    <input id="col" type="color" value="#1e3a8a" class="flex-1 h-8 bg-transparent border-none cursor-pointer">
                </div>

                <select id="tex" class="bg-black p-4 rounded-xl border border-white/5 text-xs font-bold">
                    <option value="degradado">✨ Efecto Vivo</option><option value="malla">🏁 Malla Pro</option><option value="solido">🎨 Color Liso</option>
                </select>

                <select id="fnt" class="bg-black p-4 rounded-xl border border-white/5 text-xs font-bold">
                    <option value="font-black italic">Letra Impacto</option><option value="font-serif">Letra Elegante</option>
                </select>
            </div>

            <div class="flex gap-2 mt-6">
                <button onclick="guardar()" id="btn-save" class="flex-1 bg-blue-600 hover:bg-blue-500 py-5 rounded-[2rem] font-black text-lg shadow-xl uppercase tracking-widest transition-all">
                    Lanzar Anuncio
                </button>
                <button id="btn-cancel" onclick="resetForm()" class="hidden bg-slate-700 hover:bg-slate-600 px-6 rounded-[2rem] font-bold uppercase text-xs">
                    Cancelar
                </button>
            </div>
        </div>

        <!-- LISTADO DE REGISTROS -->
        <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-white/10">
            <h2 class="text-xl font-black mb-6 uppercase text-slate-400 tracking-widest">Gestión de Carrusel</h2>
            <div id="lista-anuncios" class="space-y-4 text-sm">
                <!-- Los anuncios cargan aquí -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" }));

        // GUARDAR O ACTUALIZAR
        window.guardar = () => {
            const id = document.getElementById('edit-id').value;
            const data = {
                titulo: document.getElementById('tit').value,
                media: document.getElementById('med').value,
                tipo: document.getElementById('tip').value,
                color: document.getElementById('col').value,
                textura: document.getElementById('tex').value,
                fuente: document.getElementById('fnt').value,
                link: document.getElementById('lin').value || "https://wa.me/tu_numero",
                activo: true,
                vence: Date.now() + (30 * 86400000)
            };

            if(!data.titulo || !data.media) return alert("❌ Datos incompletos");

            if(id) {
                // ACTUALIZAR REGISTRO EXISTENTE
                update(ref(db, `carrusel/${id}`), data).then(() => {
                    alert("✅ Cambios Guardados");
                    resetForm();
                });
            } else {
                // CREAR NUEVO
                push(ref(db, 'carrusel'), data).then(() => {
                    alert("🚀 Publicado con éxito");
                    resetForm();
                });
            }
        };

        // CARGAR LISTA EN TIEMPO REAL
        onValue(ref(db, 'carrusel'), (snap) => {
            const list = document.getElementById('lista-anuncios');
            list.innerHTML = "";
            const ads = snap.val();
            if(!ads) return list.innerHTML = "<p class='text-slate-600'>No hay anuncios activos.</p>";

            Object.keys(ads).forEach(id => {
                const ad = ads[id];
                list.innerHTML += `
                    <div class="bg-black/40 p-5 rounded-2xl flex items-center justify-between border border-white/5 hover:border-blue-500/20">
                        <div>
                            <p class="font-black text-blue-400 uppercase text-xs">${ad.titulo}</p>
                            <p class="text-[10px] text-slate-500 truncate w-40">${ad.media}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicion('${id}', ${JSON.stringify(ad).replace(/"/g, '&quot;')})" class="bg-blue-900/20 text-blue-400 p-2 rounded-lg hover:bg-blue-600 hover:text-white transition-all text-[10px] font-bold">EDITAR</button>
                            <button onclick="borrar('${id}')" class="bg-red-900/20 text-red-500 p-2 rounded-lg hover:bg-red-600 hover:text-white transition-all">🗑️</button>
                        </div>
                    </div>
                `;
            });
        });

        // PREPARAR FORMULARIO PARA EDITAR
        window.prepararEdicion = (id, ad) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('tit').value = ad.titulo;
            document.getElementById('med').value = ad.media;
            document.getElementById('tip').value = ad.tipo;
            document.getElementById('col').value = ad.color;
            document.getElementById('tex').value = ad.textura;
            document.getElementById('fnt').value = ad.fuente;
            document.getElementById('lin').value = ad.link;

            document.getElementById('form-title').innerHTML = "Editando <span class='text-blue-500 font-black'>Anuncio</span>";
            document.getElementById('btn-save').innerText = "Guardar Cambios";
            document.getElementById('btn-cancel').classList.remove('hidden');
            document.getElementById('form-container').classList.add('border-blue-500');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetForm = () => {
            document.getElementById('edit-id').value = "";
            document.getElementById('tit').value = "";
            document.getElementById('med').value = "";
            document.getElementById('lin').value = "";
            document.getElementById('form-title').innerHTML = "Nuevo <span class='text-white font-light'>Anuncio</span>";
            document.getElementById('btn-save').innerText = "Lanzar Anuncio";
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('form-container').classList.remove('border-blue-500');
        };

        window.borrar = (id) => { if(confirm("¿Eliminar este anuncio permanentemente?")) remove(ref(db, `carrusel/${id}`)); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA PREMIUM ADS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Librería para el QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .qr-container { background: white; padding: 10px; border-radius: 15px; box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
        canvas, img { max-width: 100%; border-radius: 8px; }
        .premium-gradient { background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%); }
    </style>
</head>
<body class="p-4 mb-20">

    <!-- CABECERA -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-800 tracking-tighter text-blue-500">AZELERA<span class="text-white">ADS</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Premium Display System</p>
        </div>
        <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e] animate-pulse"></div>
    </div>

    <!-- PANEL DE SUBIDA (MODO CELULAR) -->
    <div class="glass p-6 rounded-[2rem] space-y-4 mb-8">
        <div class="space-y-2">
            <input type="text" id="tit" placeholder="Título del Anuncio (Ej: Promo Pizza)" class="w-full bg-white/5 border-none p-4 rounded-2xl text-sm focus:ring-2 ring-blue-500 outline-none">
            <input type="text" id="lin" placeholder="Link (WhatsApp o Web para el QR)" class="w-full bg-white/5 border-none p-4 rounded-2xl text-sm focus:ring-2 ring-blue-500 outline-none">
        </div>

        <label for="file-upload" id="file-label" class="flex flex-col items-center justify-center border-2 border-dashed border-white/10 rounded-[2rem] p-8 transition-all active:scale-95 cursor-pointer">
            <span class="text-3xl mb-2">🎬</span>
            <span id="file-info" class="text-[11px] font-bold text-gray-400 uppercase">Toca para subir Video o Foto</span>
            <input type="file" id="file-upload" class="hidden" accept="image/*,video/*">
        </label>

        <!-- VALORES OCULTOS -->
        <input type="hidden" id="med">
        <input type="hidden" id="tip" value="image">
        <input type="hidden" id="sub" value="">
        <input type="hidden" id="col" value="#3b82f6">

        <button onclick="guardar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-800 py-4 rounded-2xl shadow-lg shadow-blue-900/20 transition-all active:scale-95 uppercase text-xs tracking-widest">
            🚀 LANZAR A LA TV
        </button>
    </div>

    <!-- LISTA DE ANUNCIOS -->
    <h2 class="text-[10px] font-bold text-gray-500 mb-4 tracking-[0.3em] uppercase ml-2">Anuncios en Pantalla</h2>
    <div id="lista-anuncios" class="grid gap-4">
        <!-- Se cargan dinámicamente -->
    </div>

    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // SUBIR ARCHIVO
        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const label = document.getElementById('file-label');
            const info = document.getElementById('file-info');
            info.innerText = "PROCESANDO... ⏳";

            const ext = file.name.split('.').pop();
            const fileName = `${Date.now()}.${ext}`;

            const { data, error } = await _supabase.storage
                .from('anuncios') // Asegúrate que el bucket se llame así
                .upload(fileName, file);
            
            if (data) {
                const { data: urlData } = _supabase.storage.from('anuncios').getPublicUrl(fileName);
                document.getElementById('med').value = urlData.publicUrl; 
                info.innerText = "✅ ARCHIVO CARGADO";
                label.style.borderColor = "#3b82f6";
                document.getElementById('tip').value = file.type.includes('video') ? 'video' : 'image';
            } else {
                alert("Error: " + error.message);
                info.innerText = "❌ ERROR";
            }
        });

        // GUARDAR EN BD
        async function guardar() {
            const mediaUrl = document.getElementById('med').value;
            if(!mediaUrl) return alert("Sube un archivo primero");

            const { error } = await _supabase.from('anuncios').insert([{
                titulo: document.getElementById('tit').value || "PROMOCIÓN",
                media: mediaUrl,
                link: document.getElementById('lin').value || "https://azelera.com",
                tipo: document.getElementById('tip').value,
                activo: true
            }]);

            if(!error) {
                alert("¡ENVIADO A TV!");
                location.reload();
            }
        }

        // CARGAR LISTA
        async function cargarAnuncios() {
            const { data } = await _supabase.from('anuncios').select('*').order('id', { ascending: false });
            const list = document.getElementById('lista-anuncios');
            list.innerHTML = "";
            if(data) {
                data.forEach(ad => {
                    list.innerHTML += `
                        <div class="glass p-4 rounded-3xl flex items-center justify-between border-white/5">
                            <div class="flex items-center gap-4 truncate">
                                <div class="w-12 h-12 rounded-xl bg-blue-600/20 flex items-center justify-center text-xl">
                                    ${ad.tipo === 'video' ? '📽️' : '🖼️'}
                                </div>
                                <div class="truncate">
                                    <p class="text-xs font-800 uppercase tracking-tight">${ad.titulo}</p>
                                    <p class="text-[9px] text-gray-500 truncate">${ad.link}</p>
                                </div>
                            </div>
                            <button onclick="borrar(${ad.id})" class="text-red-500 p-2">🗑️</button>
                        </div>`;
                });
            }
        }

        async function borrar(id) {
            if(confirm("¿Quitar de la pantalla?")) {
                await _supabase.from('anuncios').delete().eq('id', id);
                cargarAnuncios();
            }
        }

        cargarAnuncios();
    </script>
</body>
</html>

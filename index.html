<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = {
            apiKey: "AIzaSyD3-C7guJHkmZuwv-TgXNh0XwlYfTSei2k",
            authDomain: "navi-9aa8e.firebaseapp.com",
            projectId: "navi-9aa8e",
            databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com", 
            appId: "1:324234630620:web:0a7353de37ac04fabd6b19"
        };

        // Inicializar
        const app = initializeApp(config);
        const db = getDatabase(app);

        // ESTO ES LO QUE HACE QUE EL BOTÓN FUNCIONE
        window.enviarAnuncio = function() {
            const texto = document.getElementById('mensajeInput').value;
            
            if(texto.trim() === "") {
                alert("Escribe un mensaje primero");
                return;
            }

            console.log("Intentando enviar:", texto);

            set(ref(db, 'anuncio_actual'), {
                mensaje: texto,
                hora: new Date().toLocaleTimeString()
            })
            .then(() => {
                alert("¡LOGRADO! El anuncio ya está en la base de datos.");
                document.getElementById('mensajeInput').value = "";
            })
            .catch((error) => {
                alert("ERROR DE PERMISOS: " + error.message);
            });
        };
    </script>
</head>
<body class="bg-[#020617] text-white flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md bg-[#0f172a] p-8 rounded-[3rem] border border-white/10 shadow-2xl text-center">
        <div class="bg-blue-600 w-16 h-16 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-500/30">
            <span class="text-3xl font-black italic">A</span>
        </div>
        
        <h1 class="text-2xl font-black mb-6 uppercase tracking-widest">Creador de <span class="text-blue-500">Anuncios</span></h1>

        <textarea id="mensajeInput" placeholder="¿Qué quieres anunciar en Atacames?" 
            class="w-full p-5 rounded-2xl bg-black border border-slate-800 text-lg focus:border-blue-500 outline-none mb-6 min-h-[120px]"></textarea>

        <button onclick="enviarAnuncio()" 
            class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-5 rounded-2xl text-xl transition-all active:scale-95 shadow-xl shadow-blue-600/20">
            PUBLICAR AHORA 🚀
        </button>
        
        <p class="mt-8 text-[10px] text-slate-500 tracking-[0.3em] uppercase italic">Azelera Ads System</p>
    </div>

</body>
</html>

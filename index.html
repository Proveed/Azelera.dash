<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN AZELERA - EDIT MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding-bottom: 40px; }
        .input-group { background: #111; border: 1px solid #222; border-radius: 1rem; padding: 10px; margin-bottom: 10px; }
        label { font-size: 10px; color: #555; font-weight: bold; text-transform: uppercase; }
        input, select { background: transparent; color: white; width: 100%; border: none; outline: none; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-black mb-6 text-blue-500">ADMIN <span class="text-white">AZELERA</span></h1>

        <div id="form-container" class="space-y-2">
            <div class="input-group"><label>Título</label><input type="text" id="tit"></div>
            <div class="input-group"><label>Subtítulo</label><input type="text" id="sub"></div>
            <div class="input-group"><label>WhatsApp/Link</label><input type="text" id="lin"></div>
            
            <div class="grid grid-cols-2 gap-2">
                <div class="input-group"><label>Comercio</label><input type="text" id="comercio"></div>
                <div class="input-group"><label>Duración (Seg)</label><input type="number" id="duracion" value="12"></div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="input-group"><label>Fuente</label>
                    <select id="fnt">
                        <option value="moderno">Moderno</option>
                        <option value="impacto">Impacto</option>
                        <option value="elegante">Elegante</option>
                    </select>
                </div>
                <div class="input-group"><label>Color Texto</label><input type="color" id="clr" value="#FFFFFF"></div>
            </div>

            <div class="input-group"><label>Fondo Hex (Verde Lima: #00FF00)</label><input type="text" id="bg_hex" placeholder="#000000"></div>

            <div class="border-2 border-dashed border-gray-800 p-4 rounded-2xl text-center mb-4">
                <input type="file" id="file-ad" class="hidden">
                <label for="file-ad" id="ad-status" class="cursor-pointer text-blue-400 text-sm">CAMBIAR O SUBIR MEDIA</label>
            </div>

            <input type="hidden" id="med_url"><input type="hidden" id="tipo">

            <button onclick="enviar()" id="btn-main" class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-lg">PUBLICAR NUEVO</button>
            <button onclick="cancelarEdicion()" id="btn-cancel" class="w-full bg-gray-800 py-2 rounded-xl text-xs hidden mt-2">CANCELAR EDICIÓN</button>
        </div>

        <div class="mt-10 space-y-3" id="lista-ads"></div>
    </div>

    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        let editId = null;

        document.getElementById('file-ad').onchange = async (e) => {
            const file = e.target.files[0];
            document.getElementById('ad-status').innerText = "SUBIENDO...";
            const name = `${Date.now()}_${file.name}`;
            const { data } = await _supabase.storage.from('anuncios').upload(`media/${name}`, file);
            if (data) {
                const { data: url } = _supabase.storage.from('anuncios').getPublicUrl(`media/${name}`);
                document.getElementById('med_url').value = url.publicUrl;
                document.getElementById('tipo').value = file.type.includes('video') ? 'video' : 'image';
                document.getElementById('ad-status').innerText = "✅ MEDIA LISTA";
            }
        };

        async function enviar() {
            const btn = document.getElementById('btn-main');
            const data = {
                titulo: document.getElementById('tit').value,
                subtitulo: document.getElementById('sub').value,
                comercio: document.getElementById('comercio').value,
                link: document.getElementById('lin').value,
                font_family: document.getElementById('fnt').value,
                bg_color: document.getElementById('bg_hex').value || '#000000',
                color: document.getElementById('clr').value,
                duracion: parseInt(document.getElementById('duracion').value),
                media: document.getElementById('med_url').value,
                tipo: document.getElementById('tipo').value,
                activo: true
            };

            if (editId) {
                await _supabase.from('anuncios').update(data).eq('id', editId);
                alert("Actualizado");
            } else {
                await _supabase.from('anuncios').insert([data]);
                alert("Publicado");
            }
            location.reload();
        }

        async function cargarAds() {
            const { data } = await _supabase.from('anuncios').select('*').order('id', {ascending:false});
            document.getElementById('lista-ads').innerHTML = data.map(ad => `
                <div class="bg-[#111] p-4 rounded-xl flex justify-between items-center border border-white/5">
                    <div>
                        <p class="font-bold text-sm">${ad.titulo}</p>
                        <p class="text-[10px] text-gray-500">${ad.comercio}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='prepararEdicion(${JSON.stringify(ad)})' class="text-blue-500 text-[10px] font-bold">EDITAR</button>
                        <button onclick="eliminar(${ad.id})" class="text-red-500 text-[10px] font-bold">BORRAR</button>
                    </div>
                </div>
            `).join('');
        }

        function prepararEdicion(ad) {
            editId = ad.id;
            document.getElementById('tit').value = ad.titulo;
            document.getElementById('sub').value = ad.subtitulo;
            document.getElementById('comercio').value = ad.comercio;
            document.getElementById('lin').value = ad.link;
            document.getElementById('duracion').value = ad.duracion;
            document.getElementById('fnt').value = ad.font_family;
            document.getElementById('bg_hex').value = ad.bg_color;
            document.getElementById('clr').value = ad.color;
            document.getElementById('med_url').value = ad.media;
            document.getElementById('tipo').value = ad.tipo;
            
            document.getElementById('btn-main').innerText = "ACTUALIZAR ANUNCIO";
            document.getElementById('btn-main').classList.replace('bg-blue-600', 'bg-green-600');
            document.getElementById('btn-cancel').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function cancelarEdicion() { location.reload(); }

        async function eliminar(id) {
            if(confirm("¿Eliminar?")) { await _supabase.from('anuncios').delete().eq('id', id); cargarAds(); }
        }

        cargarAds();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>AZELERA ADS - PANEL MAESTRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const config = { databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(config));

        // GUARDAR NUEVO
        window.guardar = () => {
            const dias = parseInt(document.getElementById('dias').value) || 1;
            const nuevo = {
                titulo: document.getElementById('tit').value,
                media: document.getElementById('med').value,
                link: document.getElementById('lin').value,
                tipo: document.getElementById('tip').value,
                color: document.getElementById('col').value,
                activo: true,
                vence: Date.now() + (dias * 24 * 60 * 60 * 1000)
            };
            push(ref(db, 'carrusel'), nuevo);
            alert("Anuncio Agregado");
        };

        // LEER LISTA Y RENDERIZAR
        onValue(ref(db, 'carrusel'), (snap) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                const ad = data[id];
                const item = document.createElement('div');
                item.className = "bg-black p-4 rounded-2xl mb-3 border border-white/5 flex justify-between items-center";
                item.innerHTML = `
                    <div class="flex-1">
                        <p class="font-bold text-blue-400">${ad.titulo}</p>
                        <p class="text-[10px] text-slate-500 uppercase">${ad.tipo} | ${ad.activo ? '✅ ACTIVO' : '❌ PAUSADO'}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggle('${id}', ${ad.activo})" class="bg-slate-800 p-2 rounded-lg text-xs">${ad.activo ? 'Pausar' : 'Activar'}</button>
                        <button onclick="borrar('${id}')" class="bg-red-900/50 p-2 rounded-lg text-xs text-red-500">Eliminar</button>
                    </div>
                `;
                lista.appendChild(item);
            });
        });

        window.toggle = (id, estado) => update(ref(db, `carrusel/${id}`), { activo: !estado });
        window.borrar = (id) => { if(confirm("¿Borrar anuncio?")) remove(ref(db, `carrusel/${id}`)); };
    </script>
</head>
<body class="bg-[#020617] text-white p-4 font-sans">
    <div class="max-w-md mx-auto">
        <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-white/10 mb-6 shadow-2xl">
            <h1 class="text-xl font-black text-blue-500 mb-4 italic text-center uppercase">Azelera <span class="text-white">Ads Studio</span></h1>
            <input id="tit" type="text" placeholder="Cliente" class="w-full p-3 mb-3 bg-black rounded-xl border border-white/5 outline-none">
            <textarea id="med" placeholder="URL Video/Imagen o Texto" class="w-full p-3 mb-3 bg-black rounded-xl border border-white/5 outline-none h-20"></textarea>
            <input id="lin" type="text" placeholder="Link QR" class="w-full p-3 mb-3 bg-black rounded-xl border border-white/5 outline-none">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <select id="tip" class="bg-black p-3 rounded-xl border border-white/5"><option value="video">Video</option><option value="image">Imagen</option><option value="texto">Texto</option></select>
                <input id="col" type="color" value="#1e3a8a" class="w-full h-12 bg-transparent">
                <input id="dias" type="number" placeholder="Días" class="bg-black p-3 rounded-xl border border-white/5 text-center">
            </div>
            <button onclick="guardar()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-lg shadow-lg shadow-blue-500/20 uppercase tracking-widest">Publicar</button>
        </div>

        <h2 class="text-xs font-bold text-slate-500 uppercase tracking-[0.3em] mb-4 ml-4">Gestionar Carrusel</h2>
        <div id="lista"></div>
    </div>
</body>
</html>

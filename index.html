<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA PRO PANEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const config = { 
            apiKey: "AIzaSyD3-C7guJHkmZuwv-TgXNh0XwlYfTSei2k", 
            authDomain: "navi-9aa8e.firebaseapp.com", 
            projectId: "navi-9aa8e", 
            databaseURL: "https://navi-9aa8e-default-rtdb.firebaseio.com", 
            appId: "1:324234630620:web:0a7353de37ac04fabd6b19" 
        };
        const db = getDatabase(initializeApp(config));

        window.publicar = () => {
            const data = {
                texto: document.getElementById('txt').value,
                mediaUrl: document.getElementById('media').value, // Link de imagen o video (mp4)
                linkCliente: document.getElementById('link').value, // Para el QR
                tipo: document.getElementById('tipo').value, // 'image' o 'video'
                timestamp: Date.now()
            };
            set(ref(db, 'anuncio_actual'), data).then(() => alert("¡PUBLICIDAD ACTIVA EN TV!"));
        };
    </script>
</head>
<body class="bg-slate-950 text-white p-6 flex justify-center">
    <div class="w-full max-w-md bg-slate-900 p-8 rounded-[2rem] border border-white/10 shadow-2xl">
        <h1 class="text-2xl font-black mb-6 text-blue-500 italic">AZELERA <span class="text-white text-sm">PRO ADS</span></h1>
        
        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Mensaje Principal</label>
        <textarea id="txt" class="w-full p-4 rounded-xl bg-black border border-slate-800 mb-4 focus:border-blue-500 outline-none" placeholder="Ej: 50% OFF EN COCTELES"></textarea>
        
        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Link de Imagen o Video (Directo)</label>
        <input id="media" type="text" class="w-full p-4 rounded-xl bg-black border border-slate-800 mb-4 outline-none" placeholder="https://url-de-tu-video.mp4">
        
        <div class="flex gap-4 mb-4">
            <div class="flex-1">
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Tipo de Media</label>
                <select id="tipo" class="w-full p-4 rounded-xl bg-black border border-slate-800 outline-none">
                    <option value="image">Imagen</option>
                    <option value="video">Video</option>
                </select>
            </div>
            <div class="flex-1">
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Link para QR</label>
                <input id="link" type="text" class="w-full p-4 rounded-xl bg-black border border-slate-800 outline-none" placeholder="https://tu-tienda.com">
            </div>
        </div>

        <button onclick="publicar()" class="w-full bg-blue-600 font-bold py-5 rounded-2xl text-xl shadow-lg shadow-blue-500/20 active:scale-95 transition-all">🚀 ENVIAR A PANTALLA</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZELERA ADS - CONTROL POSTGRES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        input, textarea, select { background: rgba(0,0,0,0.5) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .btn-green { background: #16a34a; box-shadow: 0 4px 14px rgba(22,163,74,0.3); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
        
<div id="form-card" class="glass p-8 rounded-[2.5rem] shadow-2xl self-start sticky top-10">
            <h1 id="form-title" class="text-2xl font-black italic text-blue-500 mb-6 uppercase text-center text-white">Lanzar Campaña</h1>
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input id="tit" type="text" placeholder="Nombre del Negocio (ej: PIZZA HOUSE)" class="w-full p-4 rounded-2xl text-sm">
                
                
<div class="relative group">
                    <input type="file" id="file-upload" class="hidden" accept="image/*,video/*">
                    <label for="file-upload" class="flex items-center justify-center w-full p-4 rounded-2xl border-2 border-dashed border-green-500/30 bg-green-500/5 cursor-pointer hover:bg-green-500/10 transition-all">
                        <span id="file-label" class="text-green-400 text-xs font-bold uppercase tracking-widest">📷 Cargar Foto o Video</span>
                    </label>
                </div>
                
                <input id="med" type="text" placeholder="TÍTULO IMPACTO (ej: 2X1 HOY)" class="w-full p-4 rounded-2xl text-sm font-black uppercase">
                <textarea id="sub" placeholder="Cuerpo del anuncio (Subtítulo detallado)" class="w-full p-4 rounded-2xl h-20 text-sm italic"></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="tip" class="p-4 rounded-2xl text-xs font-bold uppercase">
                        <option value="texto">📝 Texto + QR</option>
                        <option value="image">📸 Imagen Full</option>
                        <option value="video">🎥 Video Full</option>
                    </select>
                    <div class="flex items-center gap-3 p-2 glass rounded-2xl">
                        <input id="col" type="color" value="#16a34a" class="flex-1 h-10 cursor-pointer bg-transparent border-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="tex" class="p-4 rounded-2xl text-[10px] font-bold">
                        <option value="degradado">✨ Efecto Vivo</option>
                        <option value="solido">🎨 Color Liso</option>
                    </select>
                    <select id="fnt" class="p-4 rounded-2xl text-[10px] font-bold">
                        <option value="font-black italic">Letra Impacto</option>
                        <option value="font-serif italic">Letra Elegante</option>
                    </select>
                </div>
                <input id="lin" type="text" placeholder="Link WhatsApp destino" class="w-full p-4 rounded-2xl text-sm">
                <div class="flex gap-2 pt-4">
                    <button onclick="guardar()" id="btn-save" class="flex-1 btn-green py-5 rounded-[2rem] font-black uppercase tracking-widest active:scale-95 transition-all">Publicar en Postgres</button>
                    <button id="btn-cancel" onclick="resetForm()" class="hidden bg-slate-800 px-6 rounded-[2rem] text-white font-bold">X</button>
                </div>
            </div>
        </div>

        
<div class="glass p-8 rounded-[2.5rem]">
            <h2 class="text-xl font-black mb-6 uppercase text-slate-400 flex justify-between items-center">Campañas <span class="text-[10px] bg-green-500/20 text-green-400 px-3 py-1 rounded-full">RT-Sync</span></h2>
            <div id="lista-anuncios" class="space-y-4"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://vasfdurinslsoprkvusm.supabase.co';
        const supabaseKey = 'sb_publishable_KpDcdMU8_qJaeztUIhTxFg_DRvLUOQk';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // --- ARREGLO DE CARGA DE ARCHIVO ---
        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-label').innerText = "Subiendo...";
            
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await _supabase.storage.from('anuncios').upload(fileName, file);
            
            if (data) {
                const { data: urlData } = _supabase.storage.from('anuncios').getPublicUrl(fileName);
                // ESTA ES LA CORRECCIÓN: Pone la URL en el campo 'media' automáticamente
                document.getElementById('med').value = urlData.publicUrl;
                document.getElementById('file-label').innerText = "✅ Imagen Lista";
                document.getElementById('med').readOnly = true; // Bloquea el campo para no borrar la URL
            } else { alert("Error al subir"); document.getElementById('file-label').innerText = "📷 Reintentar"; }
        });

        async function cargarAnuncios() {
            const { data } = await _supabase.from('anuncios').select('*').order('id', { ascending: false });
            const list = document.getElementById('lista-anuncios');
            list.innerHTML = "";
            if (data) {
                data.forEach(ad => {
                    list.innerHTML += `
                        <div class="bg-black/40 p-5 rounded-3xl flex items-center justify-between border border-white/5">
                            <div class="truncate w-40">
                                <p class="font-black text-green-400 text-[10px] uppercase">${ad.titulo}</p>
                                <p class="text-xs text-slate-300">${ad.media.substring(0,25)}...</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick='prepararEdicion(${JSON.stringify(ad)})' class="text-green-400 font-bold text-[10px]">EDITAR</button>
                                <button onclick="borrar(${ad.id})" class="text-red-500">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        async function guardar() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                titulo: document.getElementById('tit').value,
                media: document.getElementById('med').value,
                subtitulo: document.getElementById('sub').value,
                tipo: document.getElementById('tip').value,
                color: document.getElementById('col').value,
                textura: document.getElementById('tex').value,
                fuente: document.getElementById('fnt').value,
                link: document.getElementById('lin').value || "https://wa.me/593",
                activo: true
            };
            if (id) await _supabase.from('anuncios').update(payload).eq('id', id);
            else await _supabase.from('anuncios').insert([payload]);
            resetForm(); cargarAnuncios();
        }

        async function borrar(id) { if(confirm("¿Eliminar?")) { await _supabase.from('anuncios').delete().eq('id', id); cargarAnuncios(); } }

        function prepararEdicion(ad) {
            document.getElementById('edit-id').value = ad.id;
            document.getElementById('tit').value = ad.titulo;
            document.getElementById('med').value = ad.media;
            document.getElementById('sub').value = ad.subtitulo;
            document.getElementById('tip').value = ad.tipo;
            document.getElementById('col').value = ad.color;
            document.getElementById('tex').value = ad.textura;
            document.getElementById('fnt').value = ad.fuente;
            document.getElementById('lin').value = ad.link;
            document.getElementById('btn-save').innerText = "Guardar Cambios";
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.querySelectorAll('input, textarea').forEach(i => i.value = "");
            document.getElementById('med').readOnly = false;
            document.getElementById('file-label').innerText = "📷 Cargar Foto o Video";
            document.getElementById('btn-save').innerText = "Publicar en Postgres";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        cargarAnuncios();
    </script>
</body>
</html>
